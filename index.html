<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sher Jag Gaya Hai</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --accent-color: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border-color: #333;
        }

        html, body {
            overflow-x: hidden;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
        }

        body {
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { 
            text-align: center; 
            margin-bottom: 20px; 
            position: relative; 
            width: 100%; 
            max-width: 1300px;
        }

        .top-share-btn {
            position: absolute;
            top: 0;
            right: 0;
            background: rgba(255, 204, 0, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 20;
        }

        .top-share-btn svg { width: 20px; height: 20px; fill: var(--accent-color); }

        h1 {
            font-size: clamp(1.5rem, 6vw, 2.8rem);
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin: 5px 0;
        }

        .lion-icon { font-size: 3rem; display: block; }

        .progress-container {
            width: 100%;
            max-width: 800px;
            background: var(--border-color);
            height: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--accent-color);
            transition: width 0.4s ease;
            box-shadow: 0 0 10px var(--accent-color);
        }

        #stats { margin-bottom: 25px; font-weight: bold; font-size: 1rem; }

        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        .subject-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            max-height: 550px;
            overflow-y: auto;
            transition: transform 0.3s ease;
        }

        .subject-card.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 92vw;
            height: 88vh;
            max-height: 88vh;
            z-index: 9999;
            border-color: var(--accent-color);
            box-shadow: 0 0 100px #000;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            z-index: 9998;
        }

        #overlay.active { display: block; }

        .subject-title {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            z-index: 10;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
        }

        .icon-btn svg { width: 22px; height: 22px; fill: var(--accent-color); }

        .section-h {
            color: #ff6600;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin: 15px 0 5px 0;
            padding-left: 8px;
            border-left: 3px solid #ff6600;
        }

        .lang-inline-select {
            background: #222;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 2px 5px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid #222;
            cursor: pointer;
        }

        input[type="checkbox"] {
            margin-right: 15px;
            accent-color: var(--accent-color);
            transform: scale(1.2);
            pointer-events: none;
        }

        .chapter-name { font-size: 0.9rem; color: var(--text-dim); flex: 1; }

        input:checked + .chapter-name { text-decoration: line-through; opacity: 0.3; }

        .date-badge { font-size: 0.8rem; color: #777; }

        footer {
            margin-top: 50px;
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
            width: 100%;
        }
        footer b { color: var(--accent-color); }

        .subject-card::-webkit-scrollbar { width: 5px; }
        .subject-card::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeAllCards()"></div>

    <header>
        <button class="top-share-btn" onclick="shareWebsite()" title="Share with friends">
            <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
        </button>
        <span class="lion-icon">🦁</span>
        <h1>Sher Jag Gaya Hai</h1>
    </header>

    <div class="progress-container">
        <div id="progress-bar"></div>
    </div>
    <p id="stats"></p>

    <div class="subject-grid" id="main-grid"></div>

    <footer>Made By <b>Meoponly</b> for Podar community</footer>

    <script>
        const examSchedule = [
            { 
                id: 'maths', name: "Maths", date: "06.03.2026", 
                sections: {
                    "Syllabus": ["Ch 1: Number Systems", "Ch 2: Polynomials", "Ch 3: Coordinate geometry", "Ch 4: Linear equations in two variables", "Ch 5: Introduction to Euclid's Geometry", "Ch 6: Lines and Angles", "Ch 7: Triangles", "Ch 8: Quadrilaterals", "Ch 9: Circles", "Ch 10: Heron's Formula", "Ch 11: Surface areas and volumes", "Ch 12: Statistics"]
                }
            },
            { 
                id: 'sst', name: "SST", date: "09.03.2026", 
                sections: {
                    "Economics": ["Ch 4: Food Security in India", "Ch 3: Poverty as a Challenge", "Ch 2: People as Resource"],
                    "Geography": ["Ch 6: Population", "Ch 4: Climate", "Ch 2: Physical Features of India", "Ch 3: Drainage", "Ch 1: India Size and Location", "Ch 5: Natural Vegetation (Map)"],
                    "Political Science": ["Ch 5: Democratic Rights", "Ch 3: Electoral Politics", "Ch 4: Working of Institutions", "Ch 2: Constitutional Design", "Ch 1: What is Democracy? Why Democracy?"],
                    "History": ["Ch 3: Nazism and the Rise of Hitler", "Ch 1: The French Revolution", "Ch 2: Socialism in Europe", "Map Work: World & France"]
                }
            },
            { 
                id: 'english', name: "English", date: "11.03.2026", 
                sections: {
                    "Skills & Grammar": ["Reading: Discursive Passage", "Reading: Case-based Factual", "Writing: Descriptive", "Writing: Diary", "Writing: Story", "Grammar: Determiners", "Grammar: Tenses", "Grammar: Modals", "Grammar: Subject Verb Concord", "Grammar: Reported Speech"],
                    "Beehive Prose": ["The Fun They Had", "The Sound of Music", "The Little Girl", "A Truly Beautiful Mind", "The Snake and the Mirror", "My Childhood", "Reach for the Top", "Kathmandu", "If I Were You"],
                    "Beehive Poetry": ["The Road Not Taken", "Wind", "Rain on the Roof", "The Lake Isle of Innisfree", "A Legend of the Northland", "No Men Are Foreign", "On Killing a Tree", "A Slumber Did My Spirit Seal"],
                    "Supplementary": ["The Lost Child", "The Adventures of Toto", "Iswaran the Storyteller", "In the Kingdom of Fools", "The Happy Prince", "The Last Leaf", "A House is not a Home", "The Beggar"]
                }
            },
            { id: 'lang', isLanguage: true, date: "13.03.2026" },
            { 
                id: 'it', name: "IT-402", date: "14.03.2026", 
                sections: {
                    "Subject Skills": ["Introduction to IT-ITeS", "Data Entry & Keyboarding", "Digital Documentation", "Electronic Spreadsheet", "Digital Presentation"],
                    "Employability": ["Communication Skills", "Self-Management Skills", "ICT Skills", "Entrepreneur skills", "Green skills"]
                }
            },
            { id: 'science', isScience: true, name: "Science", date: "16.03.2026" }
        ];

        const scienceSections = {
            "Chemistry": ["Ch 1: Matter in Our Surroundings", "Ch 2: Is Matter Around Us Pure?", "Ch 3: Atoms and Molecules", "Ch 4: Structure of the Atom"],
            "Biology": ["Ch 5: Fundamental Unit of Life", "Ch 6: Tissues", "Ch 12: Improvement in Food Resources"],
            "Physics": ["Ch 7: Motion", "Ch 8: Force and Laws of Motion", "Ch 9: Gravitation", "Ch 10: Work and Energy", "Ch 11: Sound"]
        };

        const languageSections = {
            "Hindi": {
                "गद्य": ["दुख का अधिकार", "एवरेस्टः मेरी शिखर यात्रा", "तुम कब जाओगे, अतिथि", "चंद्रशेखर वेंकट रामन्", "शुक्रतारे के समान"],
                "पद्य": ["रैदास के पद", "रहीम के दोहे", "गीत-अगीत", "अग्निपथ", "नए इलाके में/खुशबू रचते हैं"],
                "संचयन": ["गिल्लू", "स्मृति", "कल्लू कुम्हार की उनाकोटी", "मेरा छोटा-सा निजी पुस्तकालय"],
                "व्याकरण": ["शब्द और पद", "अनुस्वार/अनुनासिक", "उपसर्ग/प्रत्यय", "स्वर संधि", "विराम-चिह्न", "वाक्य भेद", "लेखन कार्य"]
            },
            "Marathi": {
                "पाठ": ["बेटा मी ऐकतो आहे", "जी.आय.पी रेल्वे", "व्यायामाचे महत्व", "ऑलिंपिक वर्तुळाचा गोफ", "दिव्याच्या शोधामागचे दिव्य", "उजाड उघडे माळरानही", "कुलूप", "आभाळातल्या पाऊलवाटा", "पुन्हा एकदा", "तिफन", "माझे शिक्षक"],
                "इतर": ["संतवाणी", "व्हेनिस (स्थूल)", "विश्वकोश (स्थूल)", "व्याकरण व लेखन"]
            },
            "Sanskrit": {
                "पठितावबोधनम्": ["भारतवसन्तगीति", "स्वर्णकाकः", "गोदोहनम्", "सुक्तिमौक्तिकम्", "भ्रान्तो बालः", "सिकतासेतुः", "जटायोः शौर्यम्", "पर्यावरणम्", "वाङमनः प्राणस्वरुपम्"],
                "व्याकरण": ["सन्धि", "प्रत्यया", "शब्द-धातु", "संख्या/अव्यय", "लेखन कौशल्यम्"]
            }
        };

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            const currentLang = localStorage.getItem('userLanguage') || 'Hindi';
            const savedProgress = JSON.parse(localStorage.getItem('sherProgress')) || {};

            examSchedule.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.id = `card-${item.id}`;
                
                let titleHtml = item.isLanguage ? `<select class="lang-inline-select" onchange="updateLang(this.value)"><option value="Hindi" ${currentLang === 'Hindi' ? 'selected' : ''}>Hindi</option><option value="Marathi" ${currentLang === 'Marathi' ? 'selected' : ''}>Marathi</option><option value="Sanskrit" ${currentLang === 'Sanskrit' ? 'selected' : ''}>Sanskrit</option></select>` : `<span>${item.name}</span>`;

                let contentHtml = `
                <div class="subject-title">
                    <div style="display:flex; align-items:center; gap:10px;">
                        ${titleHtml}
                        <button class="icon-btn" onclick="toggleCardSize(event, 'card-${item.id}')">
                            <svg viewBox="0 0 24 24"><path d="M21 3h-6.18c-.45 0-.82.37-.82.82v.36c0 .45.37.82.82.82H18.7l-4.97 4.97c-.32.32-.32.84 0 1.16.32.32.84.32 1.16 0L19.86 6.1v3.72c0 .45.37.82.82.82h.36c.45 0 .82-.37.82-.82V3c-.01-.4-.33-.72-.72-.73zM10.14 13.84c-.32-.32-.84-.32-1.16 0L4 18.84V15.1c0-.45-.37-.82-.82-.82h-.36c-.45 0-.82.37-.82.82v6.1c0 .41.33.74.74.74h6.1c.45 0 .82-.37.82-.82v-.36c0-.45-.37-.82-.82-.82H5.15l4.99-4.99c.32-.31.32-.83 0-1.15z"/></svg>
                        </button>
                    </div>
                    <span class="date-badge">${item.date}</span>
                </div>`;

                let dataToRender = item.isScience ? scienceSections : (item.isLanguage ? languageSections[currentLang] : item.sections);
                for (const sec in dataToRender) {
                    contentHtml += `<div class="section-h">${sec}</div>`;
                    dataToRender[sec].forEach((ch, idx) => {
                        const uid = `${item.id}-${sec}-${idx}`;
                        contentHtml += `<div class="chapter-item" onclick="toggleProgress('${uid}')"><input type="checkbox" id="${uid}" ${savedProgress[uid] ? 'checked' : ''}><span class="chapter-name">${ch}</span></div>`;
                    });
                }
                card.innerHTML = contentHtml;
                grid.appendChild(card);
            });
            updateStats();
        }

        window.toggleCardSize = (e, id) => {
            e.stopPropagation();
            const el = document.getElementById(id);
            const isExp = el.classList.contains('expanded');
            closeAllCards();
            if (!isExp) {
                el.classList.add('expanded');
                document.getElementById('overlay').classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        };

        window.closeAllCards = () => {
            document.querySelectorAll('.subject-card').forEach(c => c.classList.remove('expanded'));
            document.getElementById('overlay').classList.remove('active');
            document.body.style.overflow = 'auto';
        };

        window.toggleProgress = (id) => {
            const cb = document.getElementById(id);
            if(cb) {
                cb.checked = !cb.checked;
                const prog = JSON.parse(localStorage.getItem('sherProgress')) || {};
                prog[id] = cb.checked;
                localStorage.setItem('sherProgress', JSON.stringify(prog));
                updateStats();
            }
        };

        function updateStats() {
            const all = document.querySelectorAll('input[type="checkbox"]');
            const done = document.querySelectorAll('input[type="checkbox"]:checked');
            const perc = all.length > 0 ? (done.length / all.length) * 100 : 0;
            document.getElementById('progress-bar').style.width = perc + '%';
            document.getElementById('stats').innerText = `Progress: ${done.length} / ${all.length} Chapters (${Math.round(perc)}%)`;
        }

        window.shareWebsite = async () => {
            const data = { title: '🦁 Sher Jag Gaya Hai', text: 'Clear the syllabus with this tracker!', url: 'https://meoponly.github.io/Sher-Jag-Gaya-Hai/' };
            if (navigator.share) await navigator.share(data);
            else { navigator.clipboard.writeText(data.url); alert("Link Copied!"); }
        };

        window.updateLang = (v) => { localStorage.setItem('userLanguage', v); render(); };
        render();
    </script>
</body>
</html>
